[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: redirige todo a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de caché para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/video.mp4"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Accept-Ranges = "bytes"
